openapi: 3.0.3
info:
  title: Book API
  version: 1.0.0
paths:
  /books:
    get:
      operationId: listBooks
      description: Получить список книг.
      x-description: Возвращает все книги из хранилища в памяти.
      responses:
        '200':
          description: Книги успешно возвращены.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Book'
    post:
      operationId: createBook
      description: Создать книгу.
      x-description: Сохраняет новую книгу в хранилище в памяти и назначает идентификатор.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewBook'
      responses:
        '201':
          description: Книга успешно создана.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
  /books/{id}:
    get:
      operationId: getBook
      description: Получить книгу.
      x-description: Читает одну книгу по идентификатору из хранилища в памяти.
      parameters:
        - $ref: '#/components/parameters/BookID'
      responses:
        '200':
          description: Книга успешно возвращена.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
    put:
      operationId: updateBook
      description: Обновить книгу.
      x-description: Заменяет одну существующую книгу в хранилище в памяти.
      parameters:
        - $ref: '#/components/parameters/BookID'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NewBook'
      responses:
        '200':
          description: Книга успешно обновлена.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Book'
    delete:
      operationId: deleteBook
      description: Удалить книгу.
      x-description: Удаляет одну книгу из хранилища в памяти.
      parameters:
        - $ref: '#/components/parameters/BookID'
      responses:
        '204':
          description: Книга успешно удалена.
components:
  parameters:
    BookID:
      name: id
      in: path
      required: true
      description: Идентификатор книги.
      schema:
        type: integer
        format: int64
  schemas:
    NewBook:
      type: object
      required:
        - title
        - author
      properties:
        title:
          type: string
        author:
          type: string
    Book:
      type: object
      required:
        - id
        - title
        - author
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        author:
          type: string
